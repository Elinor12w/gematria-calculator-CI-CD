name: ci pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up uv (Fast Python Package Manager)
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run Formatter (Ruff Format)
        run: uv run ruff format --check .

      - name: Run Linter (Ruff Check)
        run: uv run ruff check .

      - name: Run Type Checker (Ty)
        run: uv run ty check

      - name: Run Automated Tests with Coverage (Pytest)
        run: uv run pytest --cov=main --cov-fail-under=80 .